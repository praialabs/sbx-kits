schemaVersion: "1"
kind: agent
name: agy
displayName: Google Antigravity CLI
description: >
  The Antigravity CLI is the lightweight Terminal User
  Interface (TUI) surface of Antigravity. It brings the
  same core agentic capabilities as Antigravity 2.0 (such
  as multi-step reasoning, multi-file editing, tool
  calling, and conversation history) directly to your
  terminal.

agent:
  image: "docker/sandbox-templates:shell-docker"
  entrypoint:
    run: [agy, --dangerously-skip-permissions, --sandbox=false]

network:
  allowedDomains:
    - "antigravity-cli-auto-updater-974169037036.us-central1.run.app:443"
    - "antigravity.google:443"
    - "storage.googleapis.com:443"

commands:
  install:
    - command: "curl -fsSL https://antigravity.google/cli/install.sh | bash"
      user: "1000"
      description: "Install Google Antigravity CLI"
